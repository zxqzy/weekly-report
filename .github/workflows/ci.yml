name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 后端测试 ────────────────────────────────────────────
  test-backend:
    name: 后端测试 (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 安装后端依赖
        run: cd backend && npm ci

      - name: 运行后端测试
        run: cd backend && npm test
        env:
          NODE_ENV: test
          DB_PATH: ':memory:'
          AI_API_KEY: ''

      - name: 后端测试覆盖率
        run: cd backend && npm run test:coverage
        env:
          NODE_ENV: test
          DB_PATH: ':memory:'
          AI_API_KEY: ''

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── 前端单元/组件测试 ──────────────────────────────────
  test-frontend:
    name: 前端组件测试 (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        run: cd frontend && npm ci

      - name: 运行前端单元测试
        run: cd frontend && npm run test:unit

      - name: 前端构建验证
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: '/api'

  # ── E2E 测试 ────────────────────────────────────────────
  test-e2e:
    name: E2E 测试 (Playwright)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装后端依赖
        run: cd backend && npm ci

      - name: 安装前端依赖
        run: cd frontend && npm ci

      - name: 安装 Playwright 浏览器
        run: cd frontend && npx playwright install chromium --with-deps

      - name: 运行 E2E 测试
        run: cd frontend && npm run test:e2e
        env:
          CI: true
          VITE_API_BASE_URL: 'http://localhost:3001/api'
          PLAYWRIGHT_BASE_URL: 'http://localhost:5173'
          # 后端环境变量（webServer 配置中使用）
          NODE_ENV: development
          DB_PATH: '/tmp/e2e_test.db'
          AI_API_KEY: ''
          PORT: '3001'

      - name: 上传 E2E 测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ── 部署 (仅 main 分支，所有测试通过后) ───────────────
  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: 触发后端部署 (Railway)
        # Railway 监听 GitHub 仓库 push 事件，会自动触发部署
        # 如果需要手动触发，可以在 Railway 控制台配置 Deploy Hook
        # 并将 Hook URL 添加到 GitHub Secrets 中 key 为 RAILWAY_DEPLOY_HOOK
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}" \
            --fail || echo "Railway deploy hook not configured, skipping."
        continue-on-error: true

      - name: 部署成功通知
        run: echo "✅ 所有测试通过，Railway 部署流程已触发！"
