services:
  - type: web
    name: weekly-report-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: AI_API_KEY
        sync: false  # 在 Render 控制台手动配置
      - key: AI_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: AI_MODEL
        value: glm-4-flash
      - key: CORS_ORIGIN
        sync: false  # 设置为前端 Vercel 域名
      - key: DB_PATH
        value: /opt/render/project/src/data/weekly_report.db
